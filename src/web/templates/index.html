<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HDR Gainmap Generator</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1e1e1e;
    color: #e5e7eb;
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #9ca3af;
    margin-bottom: 40px;
}

.drop-row {
    display: flex;
    gap: 20px;
    margin-bottom: 10px;
}

.drop-zone {
    flex: 1;
    border: 2px dashed #444;
    border-radius: 14px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    flex-direction: column;
}

.drop-zone small {
    margin-top: 8px;
    color: #6b7280;
    font-size: 12px;
}

.drop-zone img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 10px;
}

.params {
    background: #111;
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 20px;
}

.params h3 {
    margin-top: 0;
    margin-bottom: 15px;
}

button {
    display: block;
    margin: 20px auto;
    width: 200px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #60a5fa;
    color: black;
    font-weight: 600;
    cursor: pointer;
}

#result {
    margin-top: 30px;
    display: none;
}

#result img {
    max-width: 50%;
    border-radius: 12px;
    background: black;
}
</style>
</head>

<body>

<div class="container">

<h1>HDR Gainmap</h1>
<p class="subtitle">Generate an HDR image with Gainmap, optimized for SDR and HDR displays.</p>

<form id="form">

<div class="drop-row">
    <div class="drop-zone" id="drop-sdr">
        <span>Drop SDR file</span>
        <small>Standard JPEG</small>
        <small>[sRGB] or [Display P3]</small>
        <input type="file" name="sdr" hidden>
    </div>

    <div class="drop-zone" id="drop-hdr">
        <span>Drop HDR file</span>
        <small>Avif  without gainmap</small>
        <small>[PQ sRGB] or [PQ Display P3]</small>
        <input type="file" name="hdr" hidden>
    </div>
</div>

<div class="params">
    <h3>Settings</h3>

    <label>
        Preset:
        <select name="preset">
            {% for p in presets %}
                <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>
    </label>

    <br><br>

    <label>
        Add HDR tag: 
        <input type="checkbox" name="tag">
    </label>
</div>

<button type="submit" id="btn">Create HDR Gainmap</button>

</form>

<div id="result">
    <h3>Résultat</h3>
    <img id="result-img">
</div>

</div>

<script>
function setupDrop(zoneId) {
    const zone = document.getElementById(zoneId);
    const input = zone.querySelector("input");

    zone.onclick = () => input.click();

    input.onchange = () => showPreview(input.files[0], zone);

    zone.ondrop = (e) => {
        e.preventDefault();
        input.files = e.dataTransfer.files;
        showPreview(input.files[0], zone);
    };

    zone.ondragover = e => e.preventDefault();
}

function showPreview(file, zone) {
    const reader = new FileReader();
    reader.onload = e => {
        let img = zone.querySelector("img");
        if (!img) {
            img = document.createElement("img");
            zone.appendChild(img);
        }
        img.src = e.target.result;

        const span = zone.querySelector("span");
        const smalls = zone.querySelectorAll("small");

        if (span) span.style.display = "none";

        smalls.forEach(s => {
            s.style.display = "none";
        });
    };
    reader.readAsDataURL(file);
}

setupDrop("drop-sdr");
setupDrop("drop-hdr");

const form = document.getElementById("form");
const btn = document.getElementById("btn");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    btn.disabled = true;
    btn.textContent = "Processing...";

    const formData = new FormData(form);

    const response = await fetch("/", {
        method: "POST",
        body: formData
    });

    btn.disabled = false;
    btn.textContent = "Create HDR Gainmap";

    if (!response.ok) {
        alert("Erreur");
        return;
    }

    const data = await response.json();

    const resultDiv = document.getElementById("result");
    const resultImg = document.getElementById("result-img");

    resultImg.src = data.image_url;
    resultDiv.style.display = "block";

    const a = document.createElement("a");
    a.href = data.image_url;
    a.download = "output.jpg";
    a.click();
});
</script>

</body>
</html>
